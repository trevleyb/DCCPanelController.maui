<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-wifi-initialising-center">

    <defs>
        <mask id="cut-center">
            <rect x="0" y="0" width="24" height="24" fill="white"/>
            <circle cx="12" cy="12" r="5.0" fill="black"/>
        </mask>
    </defs>

    <g mask="url(#cut-center)">
